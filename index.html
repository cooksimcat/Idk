<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 아바타</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jua&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── 스탯 툴팁 ── -->
<div class="stat-tooltip" id="statTooltip"></div>

<!-- ══════════════════════════════
     메인 씬
═══════════════════════════════ -->
<div class="scene">

  <!-- 씬 상단: 이름 / 스탯 + 설정버튼 -->
  <div class="scene-header">
    <div class="pet-name-label empty" id="petNameLabel">이름 없음</div>

    <div class="stats-row">
      <div class="stat-item" data-stat="hunger" title="식욕">
        <span class="stat-icon">🍖</span>
        <div class="stat-bar-wrap"><div class="stat-bar-fill high" id="barHunger" style="width:80%"></div></div>
      </div>
      <div class="stat-item" data-stat="sleep" title="수면">
        <span class="stat-icon">💤</span>
        <div class="stat-bar-wrap"><div class="stat-bar-fill high" id="barSleep" style="width:70%"></div></div>
      </div>
      <div class="stat-item" data-stat="love" title="애정">
        <span class="stat-icon">💕</span>
        <div class="stat-bar-wrap"><div class="stat-bar-fill high" id="barLove" style="width:85%"></div></div>
      </div>
      <div class="stat-item" data-stat="clean" title="청결">
        <span class="stat-icon">🛁</span>
        <div class="stat-bar-wrap"><div class="stat-bar-fill high" id="barClean" style="width:75%"></div></div>
      </div>
      <button class="photo-btn" id="openSettingsBtn" title="설정">📷</button>
    </div>
  </div>

  <!-- 펫 박스 -->
  <div class="pet-box" id="petBox">

    <!-- 아바타 없을 때 안내 -->
    <div class="no-avatar-msg" id="noAvatarMsg">📷 사진 버튼을 눌러<br>아바타를 설정해주세요</div>

    <!-- 씻기 씬 레이어 (기본 숨김) -->
    <div class="shower-scene" id="showerScene">
      <img class="shower-img"  id="showerImg"  src="assets/ui/shower.png"         alt="샤워기">
      <img class="curtain-img" id="curtainImg" src="assets/ui/curtain-open.png"    alt="커튼">
      <img class="sparkle-img hidden" id="sparkleImg" src="assets/ui/sparkle.png" alt="반짝">
    </div>

    <!-- 수면 오버레이 -->
    <div class="sleep-overlay hidden" id="sleepOverlay">
      <img class="sleep-avatar-img" id="sleepAvatarImg" src="" alt="자는 중">
    </div>

    <!-- 박스 틀 오버레이 (개발자 커스텀 이미지) -->
    <img class="box-frame-overlay" src="assets/ui/box-frame.png" alt="" aria-hidden="true"
         onerror="this.style.display='none'">

    <!-- 액션 버튼 3개 (우하단) -->
    <div class="action-btns">
      <button class="action-btn" id="btnSleep"  title="재우기">
        <img src="assets/ui/btn-sleep.png"  alt="재우기"  onerror="this.outerHTML='💤'">
      </button>
      <button class="action-btn" id="btnEat"    title="먹이기">
        <img src="assets/ui/btn-eat.png"    alt="먹이기"  onerror="this.outerHTML='🍖'">
      </button>
      <button class="action-btn" id="btnShower" title="씻기기">
        <img src="assets/ui/btn-shower.png" alt="씻기기"  onerror="this.outerHTML='🚿'">
      </button>
    </div>

  </div><!-- /pet-box -->
</div><!-- /scene -->


<!-- ══════════════════════════════
     설정 팝업
═══════════════════════════════ -->
<div class="popup-overlay hidden" id="settingsPopup">
  <div class="popup-panel">
    <h2>🐾 아바타 설정</h2>
    <button class="close-btn" id="closeSettingsBtn">✕</button>

    <!-- 이름 -->
    <div class="name-input-wrap">
      <label>이름</label>
      <input type="text" class="name-input" id="nameInput" placeholder="아바타 이름을 입력하세요" maxlength="12">
    </div>

    <!-- 이미지 슬롯 -->
    <div class="img-slots">
      <!-- 일반 -->
      <div class="img-slot">
        <div class="img-preview-wrap" id="slotNormal" data-type="normal">
          <span class="plus-icon">＋</span>
          <img id="previewNormal" alt="일반">
          <div class="edit-overlay">✏️ 편집</div>
        </div>
        <label>😐 일반</label>
        <input type="file" class="file-input" id="fileNormal" accept="image/*">
      </div>
      <!-- 우는 -->
      <div class="img-slot">
        <div class="img-preview-wrap" id="slotCry" data-type="cry">
          <span class="plus-icon">＋</span>
          <img id="previewCry" alt="우는">
          <div class="edit-overlay">✏️ 편집</div>
        </div>
        <label>😢 우는</label>
        <input type="file" class="file-input" id="fileCry" accept="image/*">
      </div>
      <!-- 화남 -->
      <div class="img-slot">
        <div class="img-preview-wrap" id="slotAngry" data-type="angry">
          <span class="plus-icon">＋</span>
          <img id="previewAngry" alt="화나는">
          <div class="edit-overlay">✏️ 편집</div>
        </div>
        <label>😠 화남</label>
        <input type="file" class="file-input" id="fileAngry" accept="image/*">
      </div>
      <!-- 웃음 -->
      <div class="img-slot">
        <div class="img-preview-wrap" id="slotHappy" data-type="happy">
          <span class="plus-icon">＋</span>
          <img id="previewHappy" alt="웃는">
          <div class="edit-overlay">✏️ 편집</div>
        </div>
        <label>😄 웃음</label>
        <input type="file" class="file-input" id="fileHappy" accept="image/*">
      </div>
      <!-- 먹는 중 -->
      <div class="img-slot">
        <div class="img-preview-wrap" id="slotEating" data-type="eating">
          <span class="plus-icon">＋</span>
          <img id="previewEating" alt="먹는 중">
          <div class="edit-overlay">✏️ 편집</div>
        </div>
        <label>🍽️ 먹는 중</label>
        <input type="file" class="file-input" id="fileEating" accept="image/*">
      </div>
      <!-- 자는 중 -->
      <div class="img-slot">
        <div class="img-preview-wrap" id="slotSleeping" data-type="sleeping">
          <span class="plus-icon">＋</span>
          <img id="previewSleeping" alt="자는 중">
          <div class="edit-overlay">✏️ 편집</div>
        </div>
        <label>💤 자는 중</label>
        <input type="file" class="file-input" id="fileSleeping" accept="image/*">
      </div>
      <!-- 음식 -->
      <div class="img-slot">
        <div class="img-preview-wrap" id="slotFood" data-type="food">
          <span class="plus-icon">＋</span>
          <img id="previewFood" alt="음식">
          <div class="edit-overlay">✏️ 편집</div>
        </div>
        <label>🍖 음식</label>
        <input type="file" class="file-input" id="fileFood" accept="image/*">
      </div>
    </div><!-- /img-slots -->

    <button class="apply-btn" id="applyBtn">✅ 적용하기</button>
  </div>
</div>


<!-- ══════════════════════════════
     크롭 팝업
═══════════════════════════════ -->
<div class="cropper-overlay hidden" id="cropperOverlay">
  <div class="cropper-panel">
    <h3>✂️ 이미지 편집</h3>
    <div class="cropper-canvas-wrap">
      <img id="cropperImg" src="" alt="crop">
    </div>
    <div class="cropper-tools">
      <button class="crop-tool-btn" id="cropRotateLeft">↺ 회전</button>
      <button class="crop-tool-btn" id="cropRotateRight">↻ 회전</button>
      <button class="crop-tool-btn" id="cropFlipH">↔ 반전</button>
      <button class="crop-tool-btn" id="cropZoomIn">＋</button>
      <button class="crop-tool-btn" id="cropZoomOut">－</button>
      <button class="crop-tool-btn cancel" id="cropCancel">취소</button>
      <button class="crop-tool-btn primary" id="cropConfirm">적용 ✓</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script src="app.js"></script>
</body>
</html>
